<nav
  class="navbar navbar-light bg-light navbar-expand-md fixed-top navbar-top p-0"
>
  <div class="container ms-2">
    <a class="navbar-brand" href="#">
      <img src="assets/schemaDB_logo.png" alt="logo" class="logo-img" />
    </a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="zenDBNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a
            class="nav-link text-white"
            routerLink="/schema-db/services"
            #servicesPopover="ngbPopover"
            [ngbPopover]="servicesContent"
            triggers="manual"
            popoverClass="custom-services-popover"
            container="body"
            (mouseenter)="openPopover(servicesPopover)"
            (mouseleave)="scheduleClose(servicesPopover)"
            >Services</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link text-white"
            routerLink="/schema-db/about"
            #aboutUsPopover="ngbPopover"
            [ngbPopover]="aboutUsContent"
            triggers="manual"
            popoverClass="custom-about-popover"
            container="body"
            (mouseenter)="openPopover(aboutUsPopover)"
            (mouseleave)="scheduleClose(aboutUsPopover)"
            >About US</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link text-white"
            routerLink="/schema-db/explore"
            #popover="ngbPopover"
            [ngbPopover]="exploreContent"
            triggers="manual"
            popoverClass="custom-popover"
            container="body"
            (mouseenter)="openPopover(popover)"
            (mouseleave)="scheduleClose(popover)"
          >
            Explore
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-white" routerLink="/schema-db/contact"
            >Contact Us</a
          >
        </li>
      </ul>
    </div>
  </div>
</nav>

<ng-template #exploreContent>
  <div
    class="popover-content"
    (mouseenter)="cancelClose()"
    (mouseleave)="closePopover(popover)"
  >
    <ul class="list-unstyled">
      <li><a routerLink="/schema-db/explore/blog">Blog</a></li>
      <li><a routerLink="/schema-db/explore/case-studies">Case Studies</a></li>
    </ul>
  </div>
</ng-template>

<ng-template #aboutUsContent>
  <div
    class="popover-content"
    (mouseenter)="cancelClose()"
    (mouseleave)="closePopover(aboutUsPopover)"
  >
    <ul class="list-unstyled">
      <li><a routerLink="/schema-db/company-overview">Company Overview</a></li>
      <li><a routerLink="/schema-db/our-team">Our Team</a></li>
    </ul>
  </div>
</ng-template>

<ng-template #servicesContent>
  <div
    class="mega-menu"
    (mouseenter)="cancelClose()"
    (mouseleave)="closePopover(servicesPopover)"
  >
    <div class="mega-left">
      <ul>
        <li
          *ngFor="let service of services"
          (mouseenter)="setActiveService(service)"
        >
          {{ service.name }}
        </li>
      </ul>
    </div>

    <div class="mega-right">
      <h4>{{ activeService.name }}</h4>
      <p>{{ activeService.description }}</p>
      <img
        *ngIf="activeService.image"
        [src]="activeService.image"
        class="preview-image"
      />
    </div>
  </div>
</ng-template>
